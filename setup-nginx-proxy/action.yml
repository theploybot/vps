name: Setup Nginx Proxy (Docker)
description: "Ensure nginx reverse proxy container is running with correct volume mounts for configs + ACME + optional certs"

inputs:
  host:
    description: "VPS hostname or IP"
    required: true
  user:
    description: "SSH username"
    required: true
  port:
    description: "SSH port"
    required: false
    default: "22"

  nginx_container_name:
    description: "Name of nginx container"
    required: false
    default: "nginx_proxy"

  image:
    description: "Nginx image"
    required: false
    default: "nginx:alpine"

  http_port:
    description: "Host port for HTTP"
    required: false
    default: "80"
  https_port:
    description: "Host port for HTTPS"
    required: false
    default: "443"

  sites_dir:
    description: "Host dir containing per-service *.conf files"
    required: false
    default: "/opt/nginx/sites-enabled"
  acme_dir:
    description: "Host dir for ACME challenges"
    required: false
    default: "/var/www/acme-challenges"

  mount_letsencrypt:
    description: "true|false - mount /etc/letsencrypt into container (read-only)"
    required: false
    default: "false"
  letsencrypt_host_dir:
    description: "Host letsencrypt dir (usually /etc/letsencrypt)"
    required: false
    default: "/etc/letsencrypt"
  letsencrypt_container_dir:
    description: "Container letsencrypt dir (usually /etc/letsencrypt)"
    required: false
    default: "/etc/letsencrypt"

  mount_certs:
    description: "true|false - mount a host certs directory into container (read-only)"
    required: false
    default: "false"
  certs_host_dir:
    description: "Host certs dir"
    required: false
    default: "/opt/nginx/certs"
  certs_container_dir:
    description: "Container certs dir"
    required: false
    default: "/etc/nginx/certs"

runs:
  using: "composite"
  steps:
    - name: Ensure nginx proxy container is running
      uses: theploybot/vps/ssh-run@v0.0.2
      with:
        host: ${{ inputs.host }}
        user: ${{ inputs.user }}
        port: ${{ inputs.port }}
        script: |
          set -euo pipefail

          NGINX_CONTAINER="${{ inputs.nginx_container_name }}"
          IMAGE="${{ inputs.image }}"
          HTTP_PORT="${{ inputs.http_port }}"
          HTTPS_PORT="${{ inputs.https_port }}"
          SITES_DIR="${{ inputs.sites_dir }}"
          ACME_DIR="${{ inputs.acme_dir }}"

          MOUNT_LE="${{ inputs.mount_letsencrypt }}"
          LE_HOST="${{ inputs.letsencrypt_host_dir }}"
          LE_CONT="${{ inputs.letsencrypt_container_dir }}"

          MOUNT_CERTS="${{ inputs.mount_certs }}"
          CERTS_HOST="${{ inputs.certs_host_dir }}"
          CERTS_CONT="${{ inputs.certs_container_dir }}"

          echo "🔧 Setting up nginx proxy container: $NGINX_CONTAINER"
          echo "   Image: $IMAGE"
          echo "   Ports: $HTTP_PORT -> 80, $HTTPS_PORT -> 443"
          echo "   Sites: $SITES_DIR"
          echo "   ACME:  $ACME_DIR"
          echo "   Mount letsencrypt: $MOUNT_LE"
          echo "   Mount certs dir:   $MOUNT_CERTS"

          if ! command -v docker >/dev/null 2>&1; then
            echo "❌ Docker is not installed. Run docker setup first."
            exit 1
          fi

          sudo mkdir -p "$SITES_DIR" "$ACME_DIR"
          sudo chmod 755 "$SITES_DIR" "$ACME_DIR"

          DEFAULT_CONF="$SITES_DIR/00-default.conf"
          if ! sudo test -f "$DEFAULT_CONF"; then
            echo "📝 Creating default nginx config at $DEFAULT_CONF"
            sudo tee "$DEFAULT_CONF" >/dev/null <<'CONF'
          server {
              listen 80 default_server;
              server_name _;
              location /.well-known/acme-challenge/ {
                  root /var/www/acme-challenges;
                  try_files $uri =404;
              }
              location / {
                  return 200 "nginx proxy is running\n";
              }
          }
          CONF
          fi

          if [ "$MOUNT_CERTS" = "true" ]; then
            sudo mkdir -p "$CERTS_HOST"
            sudo chmod 755 "$CERTS_HOST"
          fi

          need_recreate="false"

          container_exists="false"
          container_running="false"

          if sudo docker ps -a --format '{{.Names}}' | grep -q "^${NGINX_CONTAINER}$"; then
            container_exists="true"
          fi

          if sudo docker ps --format '{{.Names}}' | grep -q "^${NGINX_CONTAINER}$"; then
            container_running="true"
          fi

          check_mount() {
            local source="$1"
            local destination="$2"
            sudo docker inspect "$NGINX_CONTAINER" \
              --format '{{range .Mounts}}{{println .Source "->" .Destination}}{{end}}' \
              | grep -Fq "$source -> $destination"
          }

          check_port() {
            local port="$1"
            sudo docker port "$NGINX_CONTAINER" 2>/dev/null | grep -q "^${port}/tcp ->"
          }

          check_image() {
            local expected="$1"
            local actual
            actual="$(sudo docker inspect "$NGINX_CONTAINER" --format '{{.Config.Image}}' 2>/dev/null || true)"
            [ "$actual" = "$expected" ]
          }

          if [ "$container_exists" = "true" ]; then
            echo "🔍 Existing nginx container found, validating configuration..."

            if ! check_image "$IMAGE"; then
              echo "♻️ Image differs, will recreate"
              need_recreate="true"
            fi

            if ! check_port 80; then
              echo "♻️ HTTP port mapping missing, will recreate"
              need_recreate="true"
            fi

            if ! check_port 443; then
              echo "♻️ HTTPS port mapping missing, will recreate"
              need_recreate="true"
            fi

            if ! check_mount "$SITES_DIR" "/etc/nginx/conf.d"; then
              echo "♻️ Sites mount missing, will recreate"
              need_recreate="true"
            fi

            if ! check_mount "$ACME_DIR" "/var/www/acme-challenges"; then
              echo "♻️ ACME mount missing, will recreate"
              need_recreate="true"
            fi

            if [ "$MOUNT_LE" = "true" ]; then
              if ! check_mount "$LE_HOST" "$LE_CONT"; then
                echo "♻️ Let's Encrypt mount missing, will recreate"
                need_recreate="true"
              fi
            fi

            if [ "$MOUNT_CERTS" = "true" ]; then
              if ! check_mount "$CERTS_HOST" "$CERTS_CONT"; then
                echo "♻️ Certs mount missing, will recreate"
                need_recreate="true"
              fi
            fi
          fi

          if [ "$container_exists" = "true" ] && [ "$need_recreate" = "false" ]; then
            if [ "$container_running" = "true" ]; then
              echo "✅ Nginx container already running with correct configuration."
              sudo docker ps --filter "name=$NGINX_CONTAINER" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
              exit 0
            else
              echo "▶️ Container exists with correct configuration but is stopped. Starting..."
              sudo docker start "$NGINX_CONTAINER"
              sudo docker ps --filter "name=$NGINX_CONTAINER" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
              exit 0
            fi
          fi

          if [ "$container_exists" = "true" ] && [ "$need_recreate" = "true" ]; then
            echo "🗑 Removing existing container so it can be recreated with correct mounts/ports..."
            sudo docker rm -f "$NGINX_CONTAINER"
          fi

          EXTRA_MOUNTS=()

          if [ "$MOUNT_LE" = "true" ]; then
            if sudo test -d "$LE_HOST"; then
              EXTRA_MOUNTS+=("-v" "$LE_HOST:$LE_CONT:ro")
            else
              echo "⚠️ letsencrypt host dir not found: $LE_HOST (skipping mount)"
            fi
          fi

          if [ "$MOUNT_CERTS" = "true" ]; then
            EXTRA_MOUNTS+=("-v" "$CERTS_HOST:$CERTS_CONT:ro")
          fi

          echo "🚀 Creating nginx proxy container..."
          sudo docker run -d --name "$NGINX_CONTAINER" \
            --restart unless-stopped \
            -p "$HTTP_PORT:80" \
            -p "$HTTPS_PORT:443" \
            -v "$SITES_DIR:/etc/nginx/conf.d:ro" \
            -v "$ACME_DIR:/var/www/acme-challenges:ro" \
            "${EXTRA_MOUNTS[@]}" \
            "$IMAGE"

          echo "🔍 Testing nginx inside container..."
          sudo docker exec "$NGINX_CONTAINER" nginx -t

          echo "✅ Nginx proxy ready:"
          sudo docker ps --filter "name=$NGINX_CONTAINER" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo "📦 Active mounts:"
          sudo docker inspect "$NGINX_CONTAINER" --format '{{range .Mounts}}{{println .Source "->" .Destination}}{{end}}'